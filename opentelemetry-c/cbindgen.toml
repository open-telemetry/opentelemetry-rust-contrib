# cbindgen configuration for opentelemetry-c.
#
# The C headers under include/opentelemetry_c/ are hand-maintained and are the source
# of truth for C consumers. This configuration exists only as a development aid to
# cross-check those curated headers against the Rust source, e.g.:
#
#     cbindgen --config cbindgen.toml --crate opentelemetry-c \
#              --output /tmp/opentelemetry_c_generated.h
#
# A normal `cargo build` does NOT run cbindgen and does not depend on it.

language = "C"
pragma_once = true
cpp_compat = true
tab_width = 4
documentation = true
documentation_style = "doxy"
include_guard = "OPENTELEMETRY_C_GENERATED_H"

# NOTE: cbindgen renders the crate's `#[repr(u32)]` validation enums
# (OtelAttributeType, OtelSpanKind, OtelSpanStatusCode) and the OtelBool alias as C
# enums / integers. The curated headers intentionally expose every discriminant a C
# caller supplies (attribute type, span kind, span status code, boolean) as a fixed-width
# `uint32_t` typedef plus named constants, NOT as a C `enum` field/parameter type, so that
# an out-of-range value can never construct an invalid Rust enum. Expect that divergence
# when diffing generated output against the curated headers; the curated headers win.

header = """
/*
 * GENERATED by cbindgen as a review aid only. The authoritative, curated headers are
 * the split files under include/opentelemetry_c/ (common.h, trace.h, sdk.h, api.h).
 */
"""

[parse]
parse_deps = false

[export]
prefix = ""

[enum]
prefix_with_name = false
rename_variants = "QualifiedScreamingSnakeCase"

[defines]
"target_pointer_width = 64" = "UINTPTR_MAX == 0xFFFFFFFFFFFFFFFFu"
