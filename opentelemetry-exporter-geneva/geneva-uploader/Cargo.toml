[package]
name = "geneva-uploader"
description = "Upload telemetry data to Geneva logs service"
version = "0.5.0"
edition = "2021"
homepage = "https://github.com/open-telemetry/opentelemetry-rust-contrib/tree/main/opentelemetry-exporter-geneva/geneva-uploader"
repository = "https://github.com/open-telemetry/opentelemetry-rust-contrib/tree/main/opentelemetry-exporter-geneva/geneva-uploader"
rust-version = "1.88.0"
keywords = ["opentelemetry", "geneva", "logs", "uploader"]
license = "Apache-2.0"

[dependencies]
otap-df-pdata-views = { git = "https://github.com/open-telemetry/otel-arrow", rev = "4f522d2e" }
opentelemetry-proto = { version = "0.31", default-features = false, features = ["logs", "trace", "gen-tonic-messages"] }
base64 = "0.22"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["raw_value"] }
uuid = { version = "1.0", features = ["v4"] }
# TODO - support both native-tls and rustls
# http2 feature is required by hyper-util even when using http1_only()
reqwest = { version = "0.13", features = ["native-tls", "native-tls-alpn", "http2"], default-features = false}
native-tls = "0.2"
thiserror = "2.0"
chrono = "0.4"
url = "2.2"
md-5 = "0.11.0"
hex = "0.4"
lz4_flex = { version = "0.11", features = ["safe-encode"], default-features = false }
# Azure Identity dependencies - using public crates.io versions
azure_identity = "0.29"
azure_core = "0.29"
tracing = "0.1"
# Pinned to >=0.3.47 to pick up the RUSTSEC-2026-0009 fix; upper bound excludes
# 0.3.48 which introduces a trait impl that conflicts with typespec_client_core
# (transitive via azure_core) and breaks the build (E0119). Not used directly.
time = ">=0.3.47, <0.3.48"

[features]
mock_auth = [] # Disabled by default. Not to be enabled in the prod release. 
default = []

[dev-dependencies]
geneva-test-server = { path = "../geneva-test-server", features = ["testing"] }
otap-df-pdata = { git = "https://github.com/open-telemetry/otel-arrow", rev = "4f522d2e" }
prost = "0.14"
tokio = { version = "1", features = ["full"] }
rcgen = "0.14"
openssl = { version = "0.10", features = ["vendored"] }
tempfile = "3.5"
wiremock = "0.6"
futures = "0.3"
num_cpus = "1.16"
lz4_flex = { version = "0.11" }
criterion = {version = "0.8"}
rand = {version = "0.9"}

[lints]
workspace = true

[package.metadata.cargo-machete]
ignored = ["md-5", "time"] # md-5 is incorrectly detected as unused; time is pinned to pull in the RUSTSEC-2026-0009 fix transitively.
