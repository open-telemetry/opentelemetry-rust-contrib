[package]
name = "opentelemetry-exporter-geneva"
description = "OpenTelemetry exporter for Geneva logs and traces"
version = "0.5.0"
edition = "2021"
homepage = "https://github.com/open-telemetry/opentelemetry-rust-contrib/tree/main/opentelemetry-exporter-geneva/opentelemetry-exporter-geneva"
repository = "https://github.com/open-telemetry/opentelemetry-rust-contrib/tree/main/opentelemetry-exporter-geneva/opentelemetry-exporter-geneva"
rust-version = "1.88.0"
keywords = ["opentelemetry", "geneva", "logs", "traces", "exporter"]
license = "Apache-2.0"

[dependencies]
opentelemetry_sdk = { version = "0.31", default-features = false, features = ["logs", "trace"] }
opentelemetry-proto = { version = "0.31", default-features = false, features = ["logs", "trace"] }
geneva-uploader = { path = "../geneva-uploader", version = "0.5.0", default-features = false }
futures = "0.3"
otap-df-pdata-views = { git = "https://github.com/open-telemetry/otel-arrow", rev = "15371dc7" }

[features]
# TLS backend selection is forwarded to geneva-uploader. `tls-native` (default)
# matches the pre-existing behavior; enable `tls-rustls` for an OpenSSL-free build
# (e.g. when pairing with a `rustls::crypto::CryptoProvider` such as rustls-symcrypt).
# The features are additive, mirroring the inner crate; if both are enabled,
# `tls-rustls` takes precedence at runtime.
default = ["tls-native"]
tls-native = ["geneva-uploader/tls-native"]
tls-rustls = ["geneva-uploader/tls-rustls"]

[dev-dependencies]
opentelemetry-appender-tracing = { version = "0.31" }
opentelemetry = { version = "0.31" }
opentelemetry_sdk = { version = "0.31", features = ["logs", "trace", "experimental_logs_batch_log_processor_with_async_runtime", "experimental_async_runtime", "rt-tokio"] }
tracing = { version = "0.1", default-features = false, features = ["std"] }
tracing-core = "0.1.31"
tracing-subscriber = { version = "0.3.0", default-features = false, features = ["env-filter", "fmt", "registry", "std"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[lints]
workspace = true
